<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricut カット設定データベース</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F0;--cream-dark:#EDE8DC;--teal:#5BBCB0;--teal-light:#B2E0DB;--teal-dark:#3D9E92;--green:#7BBF6A;--green-light:#C8E8BF;--text:#3A4A3F;--text-light:#6B7C72;--white:#FFFFFF}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,var(--teal) 0%,var(--teal-dark) 100%);padding:16px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 3px 12px rgba(61,158,146,0.3);position:sticky;top:0;z-index:100}
header .logo{font-size:24px}
header h1{color:white;font-size:16px;font-weight:700;line-height:1.3}
header p{color:rgba(255,255,255,0.85);font-size:11px;margin-top:1px}
.stats-bar{background:var(--teal-light);padding:8px 20px;display:flex;gap:12px;font-size:12px;color:var(--teal-dark);font-weight:500;flex-wrap:wrap}
.machine-toggle{display:flex;gap:0;background:var(--cream-dark);border-radius:12px;padding:4px;margin:14px 20px 0}
.machine-btn{flex:1;padding:8px 4px;border:none;border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--text-light)}
.machine-btn.active{background:var(--teal);color:white;box-shadow:0 2px 8px rgba(91,188,176,0.4)}
.controls{padding:12px 20px 14px;display:flex;flex-direction:column;gap:10px}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;border:2px solid var(--teal-light);border-radius:24px;font-family:'Noto Sans JP',sans-serif;font-size:14px;background:var(--white);color:var(--text);outline:none;transition:border-color 0.2s}
.search-wrap input:focus{border-color:var(--teal)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:16px;border:2px solid var(--teal-light);background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text-light);cursor:pointer;transition:all 0.2s;font-weight:500;white-space:nowrap}
.chip:hover,.chip.active{background:var(--teal);border-color:var(--teal);color:white}
.blade-chip{padding:5px 12px;border-radius:16px;border:2px solid #D4A8E0;background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:11px;color:#7A5A8A;cursor:pointer;transition:all 0.2s;font-weight:500;white-space:nowrap}
.blade-chip:hover,.blade-chip.active{background:#9B6BB5;border-color:#9B6BB5;color:white}
.sort-label{font-size:11px;color:var(--text-light);font-weight:600;white-space:nowrap}
.sort-btn{padding:5px 12px;border-radius:16px;border:2px solid var(--teal-light);background:var(--white);font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text-light);cursor:pointer;transition:all 0.2s;font-weight:500;white-space:nowrap}
.sort-btn:hover{border-color:var(--teal);color:var(--teal)}
.sort-btn.active{background:var(--teal-dark);border-color:var(--teal-dark);color:white}
.sort-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.blade-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.divider{height:1px;background:var(--cream-dark);margin:2px 0}
.result-count{padding:0 20px 8px;font-size:12px;color:var(--text-light)}
.cards{padding:0 16px 80px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--white);border-radius:14px;padding:14px 16px;box-shadow:0 2px 8px rgba(91,188,176,0.1);border-left:4px solid var(--teal-light);transition:box-shadow 0.2s,transform 0.15s}
.card:hover{box-shadow:0 4px 16px rgba(91,188,176,0.2);transform:translateY(-1px)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;flex:1}
.card-cat{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.card-specs{display:flex;gap:8px;flex-wrap:wrap}
.spec{display:flex;flex-direction:column;background:var(--cream);border-radius:8px;padding:6px 10px;min-width:60px}
.spec-label{font-size:9px;color:var(--text-light);font-weight:500;margin-bottom:2px}
.spec-value{font-size:13px;font-weight:700;color:var(--teal-dark)}
.card-products{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.product-tag{font-size:10px;background:#FFF3CD;color:#856404;border-radius:6px;padding:2px 8px;font-weight:500}
.empty{text-align:center;padding:60px 20px;color:var(--text-light);font-size:14px}
.empty .emoji{font-size:40px;margin-bottom:12px}
.fab{position:fixed;bottom:24px;right:20px;width:48px;height:48px;background:var(--teal);color:white;border:none;border-radius:50%;font-size:20px;cursor:pointer;box-shadow:0 4px 12px rgba(61,158,146,0.4);display:flex;align-items:center;justify-content:center;transition:transform 0.2s}
.fab:hover{transform:scale(1.1)}
</style>
</head>
<body>
<header>
  <div class="logo"></div>
  <div>
    <h1>Cricut カット設定データベース</h1>
    <p>by tama._.craft</p>
  </div>
</header>
<div class="stats-bar">
  <span>Joy: 87件</span>
  <span>Explorer 3: 163件</span>
  <span>Maker 3: 347件</span>
  <span>合計: 597件</span>
</div>
<div class="machine-toggle">
  <button class="machine-btn active" onclick="setMachine('Joy')">🟦 Joy</button>
  <button class="machine-btn" onclick="setMachine('Explorer3')">🟧 Explorer 3</button>
  <button class="machine-btn" onclick="setMachine('Maker3')">🟩 Maker 3</button>
  <button class="machine-btn" onclick="setMachine('all')">📋 全て</button>
</div>
<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="素材名で検索…" oninput="render()">
  </div>
  <div class="filter-chips" id="chips"></div>
  <div class="divider"></div>
  <div class="sort-row">
    <span class="sort-label">カット圧ソート：</span>
    <button class="sort-btn active" id="sort-none" onclick="setSort('none')">デフォルト</button>
    <button class="sort-btn" id="sort-pressure-asc" onclick="setSort('pressure-asc')">↑ 低い順</button>
    <button class="sort-btn" id="sort-pressure-desc" onclick="setSort('pressure-desc')">↓ 高い順</button>
  </div>
  <div class="sort-row">
    <span class="sort-label">カット回数：</span>
    <div id="multicut-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
  <div class="blade-row">
    <span class="sort-label">🔪 ブレード：</span>
    <div id="blade-chips" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
</div>
<div class="result-count" id="result-count"></div>
<div class="cards" id="cards"></div>
<button class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

 []}, {"machine": "Maker3", "category": "木材", "name": "バスウッド - 1／16インチ（1.6mm）Basswood - 1/16\" (1.6 mm)", "pressure": "750", "multicut": "14x", "blade": "ナイフブレード", "products": []}, {"machine": "Maker3", "category": "木材", "name": "バスウッド - 1／32インチ（0.8mm）Basswood - 1/32\" (0.8 mm)", "pressure": "381", "multicut": "18x", "blade": "ナイフブレード", "products": []}, {"machine": "Maker3", "category": "木材", "name": "バーチ、強力な接着剤付きBirch, Permanent Adhesive", "pressure": "350", "multicut": "1x", "blade": "ファインポイントブレード", "products": []}, {"machine": "Maker3", "category": "木材", "name": "ナチュラルウッドベニヤNatural Wood Veneer", "pressure": "345", "multicut": "4x", "blade": "ディープポイントブレード", "products": []}];
const CAT_COLOR={
  'アートボード':'#6BB379','アイロン接着タイプ':'#8AE6D6','カードストック':'#8ED17D',
  'ビニール':'#91E2F2','プラスチック':'#D88DEB','ホイル・金属':'#82B9D9',
  '布':'#FFA299','紙':'#C1E68A','その他':'#FFC559',
  'フェルト':'#E6A88A','フォーム':'#FF99EE','革':'#CCA37A','木材':'#C9A86C'
};
function catColor(cat){return CAT_COLOR[cat]||'#B2E0DB';}
function catTextColor(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>160?'#3A4A3F':'#FFFFFF';}
function parsePressure(p){const n=parseFloat(p);return isNaN(n)?-1:n;}

let currentMachine='Joy',currentCat='all',currentSort='none',currentBlade='all',currentMulticut='all';
const MACHINES=['Joy','Explorer3','Maker3','all'];

function getCategories(m){const f=m==='all'?DATA:DATA.filter(d=>d.machine===m);return['all',...new Set(f.map(d=>d.category))].sort((a,b)=>a==='all'?-1:a.localeCompare(b,'ja'));}
function getBlades(m){const f=m==='all'?DATA:DATA.filter(d=>d.machine===m);const b=[...new Set(f.map(d=>d.blade).filter(v=>v&&v!=='-'&&v!=='該当なし'))].sort((a,b)=>a.localeCompare(b,'ja'));return['all',...b];}

function setMachine(m){currentMachine=m;currentCat='all';currentBlade='all';currentSort='none';currentMulticut='all';document.querySelectorAll('.machine-btn').forEach((btn,i)=>{btn.classList.toggle('active',MACHINES[i]===m)});buildChips();buildBladeChips();buildMulticutChips();updateSortBtns();render();}
function buildChips(){const cats=getCategories(currentMachine);document.getElementById('chips').innerHTML=cats.map(c=>`<button class="chip${c===currentCat?' active':''}" onclick="setCat('${c}')">${c==='all'?'全カテゴリ':c}</button>`).join('');}
function buildBladeChips(){const blades=getBlades(currentMachine);document.getElementById('blade-chips').innerHTML=blades.map(b=>`<button class="blade-chip${b===currentBlade?' active':''}" onclick="setBlade('${b}')">${b==='all'?'全て':b}</button>`).join('');}
function buildMulticutChips(){const f=currentMachine==='all'?DATA:DATA.filter(d=>d.machine===currentMachine);const vals=[...new Set(f.map(d=>d.multicut).filter(v=>v&&v!=='-'&&v!=='該当なし'))];vals.sort((a,b)=>{const na=parseFloat(a),nb=parseFloat(b);return isNaN(na)||isNaN(nb)?a.localeCompare(b):na-nb;});document.getElementById('multicut-chips').innerHTML=['all',...vals].map(v=>`<button class="chip${v===currentMulticut?' active':''}" onclick="setMulticut('${v}')">${v==='all'?'全て':v}</button>`).join('');}
function setCat(c){currentCat=c;buildChips();render();}
function setBlade(b){currentBlade=b;buildBladeChips();render();}
function setMulticut(v){currentMulticut=v;buildMulticutChips();render();}
function setSort(s){currentSort=s;updateSortBtns();render();}
function updateSortBtns(){document.getElementById('sort-none').classList.toggle('active',currentSort==='none');document.getElementById('sort-pressure-asc').classList.toggle('active',currentSort==='pressure-asc');document.getElementById('sort-pressure-desc').classList.toggle('active',currentSort==='pressure-desc');}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let results=DATA.filter(d=>{
    const mOk=currentMachine==='all'||d.machine===currentMachine;
    const cOk=currentCat==='all'||d.category===currentCat;
    const bOk=currentBlade==='all'||d.blade===currentBlade;
    const muOk=currentMulticut==='all'||d.multicut===currentMulticut;
    const sOk=!q||d.name.toLowerCase().includes(q)||d.category.toLowerCase().includes(q);
    return mOk&&cOk&&bOk&&muOk&&sOk;
  });
  if(currentSort==='pressure-asc') results.sort((a,b)=>parsePressure(a.pressure)-parsePressure(b.pressure));
  else if(currentSort==='pressure-desc') results.sort((a,b)=>parsePressure(b.pressure)-parsePressure(a.pressure));
  document.getElementById('result-count').textContent=`${results.length}件 表示中`;
  if(results.length===0){document.getElementById('cards').innerHTML=`<div class="empty"><div class="emoji">🔍</div>見つかりませんでした</div>`;return;}
  document.getElementById('cards').innerHTML=results.map(d=>{
    const cc=catColor(d.category);
    const tc=catTextColor(cc);
    const machineTag=currentMachine==='all'?`<span style="font-size:10px;color:var(--text-light);margin-left:4px">[${d.machine}]</span>`:'';
    const products=d.products.length?`<div class="card-products">${d.products.map(p=>`<span class="product-tag">📌 ${p}</span>`).join('')}</div>`:'';
    const blade=d.blade&&d.blade!=='-'&&d.blade!=='該当なし'?`<div class="spec"><span class="spec-label">ブレード</span><span class="spec-value" style="font-size:11px">${d.blade}</span></div>`:'';
    return`<div class="card" style="border-left-color:${cc}"><div class="card-header"><div class="card-name">${d.name}${machineTag}</div><span class="card-cat" style="background:${cc};color:${tc}">${d.category}</span></div><div class="card-specs"><div class="spec"><span class="spec-label">カット圧</span><span class="spec-value">${d.pressure}</span></div><div class="spec"><span class="spec-label">カット回数</span><span class="spec-value">${d.multicut}</span></div>${blade}</div>${products}</div>`;
  }).join('');
}
buildChips();buildBladeChips();buildMulticutChips();updateSortBtns();render();
</script>
